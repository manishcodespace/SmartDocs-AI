services:
  - type: web
    name: smartdocs-ai
    runtime: python
    pythonVersion: "3.11.0"
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # Enter this manually in the Render dashboard
      - key: GEMINI_EMBEDDING_MODEL
        value: gemini-embedding-2-preview
      - key: GEMINI_CHAT_MODEL
        value: gemini-3.1-flash-lite
      - key: MONGO_URI
        sync: false          # Enter MongoDB Atlas connection string in Render dashboard
      - key: MONGO_DB_NAME
        value: smartdocs_ai
      - key: JWT_SECRET_KEY
        sync: false          # Enter a secure random secret key in Render dashboard
      - key: JWT_EXPIRE_HOURS
        value: "24"
